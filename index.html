<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Local Mosaic" />
    <title>Local Mosaic</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Local only</p>
          <h1>Local Mosaic</h1>
        </div>
        <div class="status-row">
          <span id="statusText">画像を開いてください</span>
          <span id="privacyText">ネットワーク送信なし</span>
        </div>
      </header>

      <section class="toolbar" aria-label="ツールバー">
        <input id="fileInput" type="file" accept="image/*" hidden />
        <input id="modelInput" type="file" accept=".onnx,application/octet-stream" hidden />
        <button id="openButton" type="button">画像を開く</button>
        <button id="demoButton" type="button">デモ</button>
        <button id="modelButton" type="button">ONNXを読む</button>
        <button id="autoButton" type="button" disabled>自動検出</button>
        <button id="serverButton" type="button" disabled>GPU自動</button>
        <label class="control">
          <span>形式</span>
          <select id="modelFormatSelect">
            <option value="auto">Auto</option>
            <option value="yolov8">YOLOv8</option>
            <option value="yolov5">YOLOv5</option>
            <option value="xyxy">XYXY</option>
          </select>
        </label>
        <label class="control">
          <span>入力</span>
          <select id="onnxSizeSelect">
            <option value="320" selected>320</option>
            <option value="512">512</option>
            <option value="640">640</option>
            <option value="768">768</option>
            <option value="1024">1024</option>
          </select>
        </label>
        <label class="control range-control threshold-control">
          <span>信頼度</span>
          <input id="thresholdRange" type="range" min="5" max="90" value="45" />
          <output id="thresholdValue">0.45</output>
        </label>
        <label class="control">
          <span>検出</span>
          <select id="presetSelect">
            <option value="balanced">標準</option>
            <option value="strict">強め</option>
            <option value="wide">広め</option>
          </select>
        </label>
        <label class="control range-control">
          <span>粒度</span>
          <input id="blockRange" type="range" min="8" max="64" value="28" />
        </label>
        <button id="deleteButton" type="button" disabled>削除</button>
        <button id="clearButton" type="button" disabled>全消去</button>
        <button id="downloadButton" type="button" disabled>保存</button>
      </section>

      <section class="workspace">
        <div id="dropZone" class="canvas-stage">
          <div id="emptyState" class="empty-state">
            <strong>Drop image</strong>
            <span>PNG / JPG / WebP</span>
          </div>
          <canvas id="imageCanvas"></canvas>
          <canvas id="overlayCanvas"></canvas>
        </div>

        <aside class="side-panel">
          <div class="panel-section">
            <h2>マスク</h2>
            <div id="maskList" class="mask-list"></div>
          </div>
          <div class="panel-section compact">
            <h2>処理</h2>
            <div id="onnxStatus" class="runtime-status">ONNX未読込</div>
            <label class="check-row">
              <input id="autoAfterLoad" type="checkbox" checked />
              <span>読込時に検出</span>
            </label>
            <label class="check-row">
              <input id="widePadding" type="checkbox" checked />
              <span>余白を広げる</span>
            </label>
          </div>
          <div class="panel-section compact">
            <h2>メモ</h2>
            <p>
              自動候補は保守的な補助です。最終出力前に目視で確認してください。
            </p>
          </div>
        </aside>
      </section>
    </main>

    <script src="./vendor/onnxruntime-web/ort.wasm.min.js?v=1"></script>
    <script src="./app.js?v=12"></script>
  </body>
</html>
